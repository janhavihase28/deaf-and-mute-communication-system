<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:linear-gradient(135deg,#e0f7fa,#f1f8e9);
}

/* TOPBAR */
.topbar{
 display:flex;
 align-items:center;
 gap:14px;
 padding:14px 16px;
 background:linear-gradient(90deg,#11998e,#38ef7d);
 color:white;
 font-size:22px;
 font-weight:700;
 box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* BACK BUTTON */
.backBtn{
 border:none;
 padding:10px 18px;
 border-radius:28px;
 background:linear-gradient(135deg,#ff512f,#f09819);
 color:white;
 font-size:15px;
 cursor:pointer;
 font-weight:600;
 box-shadow:0 4px 12px rgba(0,0,0,.2);
 transition:.25s;
}
.backBtn:hover{ transform:scale(1.08); }

/* TITLE */
#title{
 color:#fff;
 font-weight:800;
}

/* SEARCH BAR */
.searchBox{
 flex:1;
 width:100%;
 max-width:1500px;
 padding:14px 22px;
 border-radius:999px;
 border:none;
 font-size:16px;
 outline:none;
 background:#ffffff;
 box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

/* CONTAINER */
.container{
 margin:30px auto;
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:22px;
 padding:0 14px 30px;
}

/* CARD */
.card{
 width:100%;
 max-width:560px;
 padding:18px 22px;
 background:#ffffff;
 border-radius:22px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 10px 24px rgba(0,0,0,0.15);
 transition:.25s;
}
.card:hover{
 transform:translateY(-4px);
 box-shadow:0 16px 32px rgba(0,0,0,0.22);
}

.text{
 font-size:20px;
 font-weight:700;
 display:flex;
 align-items:center;
 gap:12px;
 color:#222;
}

/* MIC BUTTON */
.micBtn{
 width:48px;
 height:48px;
 border:none;
 border-radius:50%;
 font-size:20px;
 background:linear-gradient(135deg,#ff512f,#dd2476);
 color:white;
 cursor:pointer;
 box-shadow:0 4px 12px rgba(0,0,0,.3);
 transition:.2s;
}
.micBtn:hover{ transform:scale(1.1); }
</style>
</head>

<body>

<div class="topbar">
  <button class="backBtn" id="backBtn">⬅ Back</button>
  <div id="title">🍽 Food Choices</div>
  <input type="text" id="searchBox" class="searchBox"
   placeholder="Search..." onkeyup="searchFunction()">
</div>

<div class="container">

<div class="card"><div class="text">🍛 <span id="t1">I want food</span></div><button class="micBtn" onclick="speak(t1.innerText)">🎤</button></div>
<div class="card"><div class="text">💧 <span id="t2">I want water</span></div><button class="micBtn" onclick="speak(t2.innerText)">🎤</button></div>
<div class="card"><div class="text">🥤 <span id="t3">I want juice</span></div><button class="micBtn" onclick="speak(t3.innerText)">🎤</button></div>
<div class="card"><div class="text">🥛 <span id="t4">I want milk</span></div><button class="micBtn" onclick="speak(t4.innerText)">🎤</button></div>
<div class="card"><div class="text">🍎 <span id="t5">I want fruits</span></div><button class="micBtn" onclick="speak(t5.innerText)">🎤</button></div>
<div class="card"><div class="text">❌ <span id="t6">I don’t like this</span></div><button class="micBtn" onclick="speak(t6.innerText)">🎤</button></div>

</div>

<script>
/* BACK BUTTON */
document.getElementById("backBtn").onclick = function(){
  if (document.referrer !== "") {
    history.back();
  } else {
    location.href = "communication.html"; 
  }
};

function searchFunction(){
  let input=searchBox.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(input)?"flex":"none";
  });
}

function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  let lang=localStorage.getItem("selectedLanguage")||"en";

  let voices = speechSynthesis.getVoices();
  let selectedVoice = null;

  if(lang==="hi"){
    selectedVoice = voices.find(v => v.lang === "hi-IN");
    u.lang = "hi-IN";
  } else if(lang==="mr"){
    selectedVoice = voices.find(v => v.lang === "mr-IN");
    u.lang = "mr-IN";
  } else {
    selectedVoice = voices.find(v => v.lang === "en-US");
    u.lang = "en-US";
  }

  if(selectedVoice){
    u.voice = selectedVoice;
  } else {
    console.warn("No matching voice found for", u.lang);
  }

  speechSynthesis.speak(u);
}

function applyLang(lang){
  if(lang==="mr"){
    title.innerText="🍽 अन्न निवड";
    t1.innerText="मला जेवण हवे";
    t2.innerText="मला पाणी हवे";
    t3.innerText="मला ज्यूस हवा आहे";
    t4.innerText="मला दूध हवे आहे";
    t5.innerText="मला फळे हवी आहेत";
    t6.innerText="मला हे आवडत नाही";
    searchBox.placeholder="शोधा...";
  }
  else if(lang==="hi"){
    title.innerText="🍽 भोजन विकल्प";
    t1.innerText="मुझे खाना चाहिए";
    t2.innerText="मुझे पानी चाहिए";
    t3.innerText="मुझे जूस चाहिए";
    t4.innerText="मुझे दूध चाहिए";
    t5.innerText="मुझे फल चाहिए";
    t6.innerText="मुझे यह पसंद नहीं";
    searchBox.placeholder="खोजें...";
  }
}

// Ensure voices are loaded
speechSynthesis.onvoiceschanged = () => {
  console.log("Available voices:", speechSynthesis.getVoices());
};

window.onload=()=>{
  let lang=localStorage.getItem("selectedLanguage")||"en";
  applyLang(lang);
};
</script>

</body>
</html>
