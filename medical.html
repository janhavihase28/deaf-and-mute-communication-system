<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical</title>

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:linear-gradient(135deg,#e0f7fa,#f1f8e9);
}

/* TOPBAR */
.topbar{
 display:flex;
 align-items:center;
 gap:14px;
 padding:14px 16px;
 background:linear-gradient(90deg,#11998e,#38ef7d);
 color:white;
 font-size:22px;
 font-weight:700;
 box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* BACK BUTTON */
.backBtn{
 border:none;
 padding:10px 18px;
 border-radius:28px;
 background:linear-gradient(135deg,#ff512f,#f09819);
 color:white;
 font-size:15px;
 cursor:pointer;
 font-weight:600;
 box-shadow:0 4px 12px rgba(0,0,0,.2);
 transition:.25s;
}
.backBtn:hover{ transform:scale(1.08); }

/* TITLE */
#title{
 color:#fff;
 font-weight:800;
}

/* SEARCH BAR */
.searchBox{
 flex:1;
 width:100%;
 max-width:1500px;
 padding:14px 22px;
 border-radius:999px;
 border:none;
 font-size:16px;
 outline:none;
 background:#ffffff;
 box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

/* CONTAINER */
.container{
 margin:30px auto;
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:22px;
 padding:0 14px 30px;
}

/* CARD */
.card{
 width:100%;
 max-width:560px;
 padding:18px 22px;
 background:#ffffff;
 border-radius:22px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 10px 24px rgba(0,0,0,0.15);
 transition:.25s;
}
.card:hover{
 transform:translateY(-4px);
 box-shadow:0 16px 32px rgba(0,0,0,0.22);
}

.text{
 font-size:20px;
 font-weight:700;
 display:flex;
 align-items:center;
 gap:12px;
 color:#222;
}

/* MIC BUTTON */
.mic{
 width:48px;
 height:48px;
 border:none;
 border-radius:50%;
 font-size:20px;
 background:linear-gradient(135deg,#ff512f,#dd2476);
 color:white;
 cursor:pointer;
 box-shadow:0 4px 12px rgba(0,0,0,.3);
 transition:.2s;
}
.mic:hover{ transform:scale(1.1); }
</style>
</head>

<body>

<div class="topbar">
  <button class="backBtn" id="backBtn">⬅ Back</button>
  <div id="title">👨‍⚕ Medical</div>
  <input id="search" class="searchBox" placeholder="Search..." onkeyup="searchF()">
</div>

<div class="container">

<div class="card"><div class="text">🤒 <span id="m1">I am not feeling well</span></div><button class="mic" onclick="speakText(m1.innerText)">🎤</button></div>
<div class="card"><div class="text">💊 <span id="m2">Need medicine</span></div><button class="mic" onclick="speakText(m2.innerText)">🎤</button></div>
<div class="card"><div class="text">😖 <span id="m3">I have pain</span></div><button class="mic" onclick="speakText(m3.innerText)">🎤</button></div>
<div class="card"><div class="text">📞 <span id="m4">Call doctor</span></div><button class="mic" onclick="speakText(m4.innerText)">🎤</button></div>
<div class="card"><div class="text">💫 <span id="m5">Feeling dizzy</span></div><button class="mic" onclick="speakText(m5.innerText)">🎤</button></div>

</div>

<script>
let voices=[];

// Load voices when available
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
  console.log("Available voices:", voices);
};

/* BACK BUTTON */
document.getElementById("backBtn").onclick = function(){
  if (document.referrer !== "") {
    history.back();
  } else {
    location.href = "communication.html"; 
  }
};

function speakText(text){
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(text);
  let lang=localStorage.getItem("selectedLanguage")||"en";

  let selectedVoice = null;
  if(lang==="hi"){
    selectedVoice = voices.find(v => v.lang === "hi-IN");
    u.lang = "hi-IN";
  } else if(lang==="mr"){
    selectedVoice = voices.find(v => v.lang === "mr-IN");
    u.lang = "mr-IN";
  } else {
    selectedVoice = voices.find(v => v.lang === "en-US");
    u.lang = "en-US";
  }

  if(selectedVoice){
    u.voice = selectedVoice;
  } else {
    console.warn("No matching voice found for", u.lang);
  }

  speechSynthesis.speak(u);
}

function searchF(){
  let s=search.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(s)?"flex":"none";
  });
}

const t={
 en:{title:"👨‍⚕ Medical",p:["I am not feeling well","Need medicine","I have pain","Call doctor","Feeling dizzy"]},
 hi:{title:"👨‍⚕ चिकित्सा",p:["मुझे अच्छा नहीं लग रहा","मुझे दवा चाहिए","मुझे दर्द है","डॉक्टर बुलाओ","मुझे चक्कर आ रहा"]},
 mr:{title:"👨‍⚕ वैद्यकीय",p:["मला बरं वाटत नाही","मला औषध हवे","मला दुखत आहे","डॉक्टरांना बोलवा","मला चक्कर येते"]}
};

function applyLang(l){
  title.innerText=t[l].title;
  m1.innerText=t[l].p[0];
  m2.innerText=t[l].p[1];
  m3.innerText=t[l].p[2];
  m4.innerText=t[l].p[3];
  m5.innerText=t[l].p[4];
}

window.onload=()=>{
  applyLang(localStorage.getItem("selectedLanguage")||"en");
};
</script>

</body>
</html>
